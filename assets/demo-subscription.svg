<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace" font-size="13">
  <style>
    .bg { fill: #0d1117; }
    .header { fill: #161b22; }
    .dot-r { fill: #ff5f56; }
    .dot-y { fill: #ffbd2e; }
    .dot-g { fill: #27c93f; }
    .title { fill: #8b949e; font-size: 12px; }
    .prompt { fill: #7c3aed; }
    .cmd { fill: #e6edf3; }
    .success { fill: #3fb950; }
    .info { fill: #58a6ff; }
    .warn { fill: #d29922; }
    .dim { fill: #6e7681; }
    .white { fill: #e6edf3; }
    .highlight { fill: #f0883e; }
    .code { fill: #a5d6ff; }

    .line { opacity: 0; }
    .l1 { animation: fadeIn 0.3s 0.5s forwards; }
    .l2 { animation: fadeIn 0.3s 1.0s forwards; }
    .l3 { animation: fadeIn 0.3s 1.5s forwards; }
    .l4 { animation: fadeIn 0.3s 2.0s forwards; }
    .l5 { animation: fadeIn 0.3s 2.5s forwards; }
    .l6 { animation: fadeIn 0.3s 3.2s forwards; }
    .l7 { animation: fadeIn 0.3s 3.8s forwards; }
    .l8 { animation: fadeIn 0.3s 4.4s forwards; }
    .l9 { animation: fadeIn 0.3s 5.0s forwards; }
    .l10 { animation: fadeIn 0.3s 5.6s forwards; }
    .l11 { animation: fadeIn 0.3s 6.4s forwards; }
    .l12 { animation: fadeIn 0.3s 7.0s forwards; }
    .l13 { animation: fadeIn 0.3s 7.6s forwards; }
    .l14 { animation: fadeIn 0.3s 8.2s forwards; }
    .l15 { animation: fadeIn 0.3s 8.8s forwards; }
    .l16 { animation: fadeIn 0.3s 9.6s forwards; }
    .l17 { animation: fadeIn 0.3s 10.2s forwards; }
    .l18 { animation: fadeIn 0.3s 10.8s forwards; }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .cursor { animation: blink 1s step-end infinite; fill: #e6edf3; }
  </style>

  <!-- Terminal window -->
  <rect class="bg" width="800" height="480" rx="10" />
  <rect class="header" width="800" height="36" rx="10" />
  <rect class="bg" y="26" width="800" height="10" />
  <circle class="dot-r" cx="20" cy="18" r="6" />
  <circle class="dot-y" cx="40" cy="18" r="6" />
  <circle class="dot-g" cx="60" cy="18" r="6" />
  <text class="title" x="400" y="22" text-anchor="middle">Claude Code — /razorpay:subscription</text>

  <!-- User prompt -->
  <g class="line l1">
    <text x="20" y="62"><tspan class="prompt">❯ </tspan><tspan class="cmd">Add subscription billing to my app</tspan></text>
  </g>

  <!-- Detection -->
  <g class="line l2">
    <text x="20" y="88" class="dim">  Reusing existing Razorpay singleton at lib/razorpay.ts</text>
  </g>
  <g class="line l3">
    <text x="20" y="108"><tspan class="success">  ✓</tspan><tspan class="white"> Found plans config: monthly (₹499) + yearly (₹4,999)</tspan></text>
  </g>
  <g class="line l4">
    <text x="20" y="128"><tspan class="success">  ✓</tspan><tspan class="white"> Found Clerk auth: using auth() pattern</tspan></text>
  </g>
  <g class="line l5">
    <text x="20" y="148"><tspan class="success">  ✓</tspan><tspan class="white"> Found Tailwind + shadcn/ui components</tspan></text>
  </g>

  <!-- Building -->
  <g class="line l6">
    <text x="20" y="178" class="info">  Building subscription checkout...</text>
  </g>
  <g class="line l7">
    <text x="20" y="198"><tspan class="success">  ✓</tspan><tspan class="white"> Created app/api/billing/create-subscription/route.ts</tspan></text>
  </g>
  <g class="line l8">
    <text x="20" y="218"><tspan class="dim">    </tspan><tspan class="warn">⚠ Using hosted checkout (short_url) — not JS SDK popup</tspan></text>
  </g>
  <g class="line l9">
    <text x="20" y="238"><tspan class="dim">    </tspan><tspan class="warn">⚠ fail_existing: 0 as 0 | 1 — SDK types lie</tspan></text>
  </g>
  <g class="line l10">
    <text x="20" y="258"><tspan class="success">  ✓</tspan><tspan class="white"> Created app/api/billing/status/route.ts</tspan></text>
  </g>

  <!-- Component -->
  <g class="line l11">
    <text x="20" y="288" class="info">  Building checkout component...</text>
  </g>
  <g class="line l12">
    <text x="20" y="308"><tspan class="success">  ✓</tspan><tspan class="white"> Created components/checkout-button.tsx</tspan></text>
  </g>
  <g class="line l13">
    <text x="20" y="328"><tspan class="dim">    </tspan><tspan class="code">Popup fallback + visibilitychange polling built in</tspan></text>
  </g>
  <g class="line l14">
    <text x="20" y="348"><tspan class="success">  ✓</tspan><tspan class="white"> Deduplicating pending subscriptions (no double charges)</tspan></text>
  </g>
  <g class="line l15">
    <text x="20" y="368"><tspan class="success">  ✓</tspan><tspan class="white"> Phone number auto-stripped for Razorpay</tspan></text>
  </g>

  <!-- Chain -->
  <g class="line l16">
    <text x="20" y="398" class="success">  ✓ Checkout flow ready — 3 files created</text>
  </g>
  <g class="line l17">
    <text x="20" y="422"><tspan class="highlight">  → Building webhook handler next so payments activate subscriptions...</tspan></text>
  </g>
  <g class="line l18">
    <text x="20" y="450"><tspan class="dim">    Spawning razorpay-webhook agent...</tspan></text>
  </g>

  <!-- Blinking cursor -->
  <g class="line l18">
    <rect class="cursor" x="340" y="440" width="8" height="16" rx="1" />
  </g>
</svg>
