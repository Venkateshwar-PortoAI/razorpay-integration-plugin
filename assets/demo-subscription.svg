<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, monospace" font-size="13">
  <style>
    .bg { fill: #0d1117; }
    .header { fill: #161b22; }
    .dot-r { fill: #ff5f56; }
    .dot-y { fill: #ffbd2e; }
    .dot-g { fill: #27c93f; }
    .title { fill: #8b949e; font-size: 12px; }
    .prompt { fill: #7c3aed; }
    .cmd { fill: #e6edf3; }
    .success { fill: #3fb950; }
    .info { fill: #58a6ff; }
    .warn { fill: #d29922; }
    .dim { fill: #6e7681; }
    .white { fill: #e6edf3; }
    .highlight { fill: #f0883e; }
    .code { fill: #a5d6ff; }

    .line { opacity: 0; }
    .l1 { animation: fadeIn 0.3s 0.5s forwards; }
    .l2 { animation: fadeIn 0.3s 1.0s forwards; }
    .l3 { animation: fadeIn 0.3s 1.5s forwards; }
    .l4 { animation: fadeIn 0.3s 2.0s forwards; }
    .l5 { animation: fadeIn 0.3s 2.5s forwards; }
    .l6 { animation: fadeIn 0.3s 3.2s forwards; }
    .l7 { animation: fadeIn 0.3s 3.8s forwards; }
    .l8 { animation: fadeIn 0.3s 4.4s forwards; }
    .l9 { animation: fadeIn 0.3s 5.0s forwards; }
    .l10 { animation: fadeIn 0.3s 5.6s forwards; }
    .l11 { animation: fadeIn 0.3s 6.4s forwards; }
    .l12 { animation: fadeIn 0.3s 7.0s forwards; }
    .l13 { animation: fadeIn 0.3s 7.6s forwards; }
    .l14 { animation: fadeIn 0.3s 8.2s forwards; }
    .l15 { animation: fadeIn 0.3s 8.8s forwards; }
    .l16 { animation: fadeIn 0.3s 9.6s forwards; }
    .l17 { animation: fadeIn 0.3s 10.2s forwards; }
    .l18 { animation: fadeIn 0.3s 10.8s forwards; }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .cursor { animation: blink 1s step-end infinite; fill: #e6edf3; }
  </style>

  <!-- Terminal window -->
  <rect class="bg" width="800" height="480" rx="10" />

  <!-- Claude Code header -->
  <rect class="header" width="800" height="56" rx="10" />
  <rect class="bg" y="46" width="800" height="10" />

  <!-- Claude ASCII mascot -->
  <rect x="14" y="10" width="6" height="6" fill="#c4856b" />
  <rect x="20" y="10" width="6" height="6" fill="#c4856b" />
  <rect x="26" y="10" width="6" height="6" fill="#c4856b" />
  <rect x="8" y="16" width="6" height="6" fill="#c4856b" />
  <rect x="14" y="16" width="6" height="6" fill="#c4856b" />
  <rect x="20" y="16" width="6" height="6" fill="#c4856b" />
  <rect x="26" y="16" width="6" height="6" fill="#c4856b" />
  <rect x="32" y="16" width="6" height="6" fill="#c4856b" />
  <rect x="8" y="22" width="6" height="6" fill="#c4856b" />
  <rect x="14" y="22" width="6" height="6" fill="#905a47" />
  <rect x="20" y="22" width="6" height="6" fill="#c4856b" />
  <rect x="26" y="22" width="6" height="6" fill="#905a47" />
  <rect x="32" y="22" width="6" height="6" fill="#c4856b" />
  <rect x="8" y="28" width="6" height="6" fill="#c4856b" />
  <rect x="14" y="28" width="6" height="6" fill="#c4856b" />
  <rect x="20" y="28" width="6" height="6" fill="#c4856b" />
  <rect x="26" y="28" width="6" height="6" fill="#c4856b" />
  <rect x="32" y="28" width="6" height="6" fill="#c4856b" />
  <rect x="14" y="34" width="6" height="6" fill="#c4856b" />
  <rect x="20" y="34" width="6" height="6" fill="#c4856b" />
  <rect x="26" y="34" width="6" height="6" fill="#c4856b" />

  <text x="48" y="22" font-size="14" font-weight="bold" fill="#e6edf3">Claude Code</text>
  <text x="160" y="22" font-size="12" fill="#6e7681">v2.1</text>
  <text x="48" y="38" font-size="11" fill="#6e7681">Opus 4.6 · ~/my-saas-app</text>

  <!-- User prompt -->
  <g class="line l1">
    <text x="20" y="78"><tspan class="prompt">❯ </tspan><tspan class="cmd">Add subscription billing to my app</tspan></text>
  </g>

  <!-- Detection -->
  <g class="line l2">
    <text x="20" y="100" class="dim">  Reusing existing Razorpay singleton at lib/razorpay.ts</text>
  </g>
  <g class="line l3">
    <text x="20" y="118"><tspan class="success">  ✓</tspan><tspan class="white"> Found plans config: monthly (₹499) + yearly (₹4,999)</tspan></text>
  </g>
  <g class="line l4">
    <text x="20" y="136"><tspan class="success">  ✓</tspan><tspan class="white"> Found Clerk auth: using auth() pattern</tspan></text>
  </g>
  <g class="line l5">
    <text x="20" y="154"><tspan class="success">  ✓</tspan><tspan class="white"> Found Tailwind + shadcn/ui components</tspan></text>
  </g>

  <!-- Building -->
  <g class="line l6">
    <text x="20" y="180" class="info">  Building subscription checkout...</text>
  </g>
  <g class="line l7">
    <text x="20" y="198"><tspan class="success">  ✓</tspan><tspan class="white"> Created app/api/billing/create-subscription/route.ts</tspan></text>
  </g>
  <g class="line l8">
    <text x="20" y="216"><tspan class="dim">    </tspan><tspan class="warn">⚠ Using hosted checkout (short_url) — not JS SDK popup</tspan></text>
  </g>
  <g class="line l9">
    <text x="20" y="234"><tspan class="dim">    </tspan><tspan class="warn">⚠ fail_existing: 0 as 0 | 1 — SDK types lie</tspan></text>
  </g>
  <g class="line l10">
    <text x="20" y="252"><tspan class="success">  ✓</tspan><tspan class="white"> Created app/api/billing/status/route.ts</tspan></text>
  </g>

  <!-- Component -->
  <g class="line l11">
    <text x="20" y="278" class="info">  Building checkout component...</text>
  </g>
  <g class="line l12">
    <text x="20" y="296"><tspan class="success">  ✓</tspan><tspan class="white"> Created components/checkout-button.tsx</tspan></text>
  </g>
  <g class="line l13">
    <text x="20" y="314"><tspan class="dim">    </tspan><tspan class="code">Popup fallback + visibilitychange polling built in</tspan></text>
  </g>
  <g class="line l14">
    <text x="20" y="332"><tspan class="success">  ✓</tspan><tspan class="white"> Deduplicating pending subscriptions (no double charges)</tspan></text>
  </g>
  <g class="line l15">
    <text x="20" y="350"><tspan class="success">  ✓</tspan><tspan class="white"> Phone number auto-stripped for Razorpay</tspan></text>
  </g>

  <!-- Chain -->
  <g class="line l16">
    <text x="20" y="378" class="success">  ✓ Checkout flow ready — 3 files created</text>
  </g>
  <g class="line l17">
    <text x="20" y="402"><tspan class="highlight">  → Building webhook handler next so payments activate subscriptions...</tspan></text>
  </g>
  <g class="line l18">
    <text x="20" y="426"><tspan class="dim">    Spawning razorpay-webhook agent...</tspan></text>
  </g>

  <!-- Blinking cursor -->
  <g class="line l18">
    <rect class="cursor" x="340" y="416" width="8" height="16" rx="1" />
  </g>
</svg>
